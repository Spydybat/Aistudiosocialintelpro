<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="si-cyan-blue-gradient" x1="20" y1="20" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#60A5FA" />
      <stop offset="50%" stopColor="#38BDF8" />
      <stop offset="100%" stopColor="#22D3EE" />
    </linearGradient>
  </defs>
  
  {/* 'S' Monogram Path */}
  <path
    d="M 54,34 C 44,28 26,28 26,40 C 26,51 54,49 54,60 C 54,72 36,72 26,66"
    stroke="url(#si-cyan-blue-gradient)"
    strokeWidth="11"
    strokeLinecap="round"
    strokeLinejoin="round"
  />

  {/* Lowercase 'i' Vertical Pill */}
  <path
    d="M 72,42 V 66"
    stroke="url(#si-cyan-blue-gradient)"
    strokeWidth="11"
    strokeLinecap="round"
  />

  {/* Lowercase 'i' Dot */}
  <circle
    cx="72"
    cy="26"
    r="5.5"
    fill="url(#si-cyan-blue-gradient)"
  />
</svg>
